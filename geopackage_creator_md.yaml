app_name: Geopackage Creator

version: 1.0

purpose: "Create a data package for a study area located within the Yukon and British Columbia."

other:   "Three sources of data are needed to use the app: bp_datasets.gpkg, project.gpkg, and species.gpkg. All layers are projected to the Yukon Albers equal area coordinate reference system (CRS; EPSG:3578)."

access: "https://beaconsproject.shinyapps.io/geopackage_creator/"

inputs:
   bp_datasets.gpkg:
    - bnd
    - fda
    - fires
    - footprint_500m
    - intact_fl_2000
    - intact_fl_2020
    - protected_areas
    - linear_disturbances
    - areal_disturbances
    
   projected.gpkg:
    - placer_claims
    - quartz_claims
    
   species.gpkg:
    - caribou_herds

required_columns:
  sd_line:
    TYPE_INDUSTRY:
      used_by:
        - Disturbance Explorer
      format: character
      description: "Used to classify industry type in the demo dataset"
    TYPE_DISTURBANCE:
      used_by:
        - Disturbance Explorer
      format: character
      description: "Used to classify disturbance type in the demo dataset"
  sd_poly:
    TYPE_INDUSTRY:
      used_by:
        - Disturbance Explorer
      format: character
      description: "Used to classify industry type in the demo dataset"
    TYPE_DISTURBANCE:
      used_by:
        - Disturbance Explorer
      format: character
      description: "Used to classify disturbance type in the demo dataset"
  fires:
    YEAR:
      used_by:
        - Disturbance Explorer
      format: integer
      description: "Used to filter fires by year range"
    CAUSE:
      used_by:
        - Disturbance Explorer
      format: character
      allow_null: true
      expected_values:
        - Human
        - Natural
        - Undetermined
      description: "Used by leaflet to map fires. Expected values are : Human, Natural, Undetermined"

outputs:
  - disturbances-YYYY-mm-dd.gpkg

next_apps:
  - Disturbance Explorer App
  - Hydrology Explorer App
  - Caribou CE Explorer App
  
